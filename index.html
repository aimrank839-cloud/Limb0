<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A Question ❤️</title>

<style>
body {
    background: #ffdde1;
    text-align: center;
    font-family: Arial;
    margin-top: 20%;
}

h1 {
    color: #d6336c;
}

button {
    padding: 10px 20px;
    margin: 10px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#yes {
    background: #28a745;
    color: white;
}

#no {
    background: #dc3545;
    color: white;
    position: absolute;
}
</style>

</head>
<body>

<h1>Houda ❤️</h1>
<h2>Will you be my girlfriend? 💖</h2>

<button id="yes" onclick="yesAnswer()">Yes 💕</button>
<button id="no" onmouseover="moveNo()">No 😢</button>

<script>
function yesAnswer() {
    document.body.innerHTML = "<h1>I knew you would say YES 😍❤️</h1>";
}

function moveNo() {
    let x = Math.random() * window.innerWidth;
    let y = Math.random() * window.innerHeight;

    document.getElementById("no").style.left = x + "px";
    document.getElementById("no").style.top = y + "px";
}
</script>

</body>
</html>
